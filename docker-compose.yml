version: "3.7"

services:
  # ==========================================
  # 1. NGINX - Giữ nguyên vì Nginx cực nhẹ
  # ==========================================
  nginx:
    # Pin thay vì `latest`: giữ nguyên biến thể debian đang chạy, chỉ cố định phiên bản
    # để build/deploy tái lập được. Nâng có chủ đích, không để tag tự trôi.
    image: "nginx:1.31.3"
    restart: always
    ports:
      - "80:80"
      - "443:443"
    # mem_limit/mem_reservation (V1-compatible) mirror deploy.resources (V2/swarm)
    # để hard cap RAM có hiệu lực dù chạy `docker-compose` (V1) hay `docker compose` (V2).
    mem_limit: 256M
    mem_reservation: 64M
    deploy:
      resources:
        limits:
          memory: 256M # Tăng lên một chút để xử lý SSL/Caching tốt hơn
        reservations:
          memory: 64M
    # Giới hạn log json-file: 10m x 3 file = tối đa 30m/service → không phình đầy đĩa VPS.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template
      - ./ssl:/etc/nginx/ssl
    networks:
      - web-proxy
    depends_on:
      - fastapi
      - nextjs
    # SEC-07: nginx chỉ cần DOMAIN_NAME (xem envsubst trong command bên dưới). Trước đây
    # nạp cả .env.production nên container này giữ luôn Mongo URI, SECRET_KEY, SMTP, R2,
    # OAuth và LLM key mà không dùng đến một cái nào.
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    command: /bin/sh -c "cat /etc/nginx/ssl/domain.pem > /etc/nginx/ssl/fullchain.pem && echo '' >> /etc/nginx/ssl/fullchain.pem && cat /etc/nginx/ssl/Chain_RootCA_Bundle.crt >> /etc/nginx/ssl/fullchain.pem && envsubst '$$DOMAIN_NAME' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  # ==========================================
  # 2. FASTAPI - 2 uvicorn workers + shared SSE cache + scheduler gate
  # VPS 8GB share với MongoDB standalone (~1.5G) + MSSQL (1.5G) + OS (~1G)
  # → Budget cho FastAPI: ~1.5G là vừa
  # ==========================================
  fastapi:
    build:
      context: ./finext-fastapi
      dockerfile: dockerfile
    restart: always
    # mem_limit/cpus (V1-compatible) mirror deploy.resources (V2/swarm). ~1.5G = 1536M.
    mem_limit: 1536M
    cpus: 1.5
    mem_reservation: 512M
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5' # 2 worker share 1.5 core → mỗi worker ~0.75 core, đủ cho async I/O
        reservations:
          memory: 512M # 2 worker × ~250MB Python+lib = ~500MB baseline
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Healthcheck qua /api/v1/health: endpoint này trả 503 khi mất kết nối Mongo (kể cả
    # do lỗi index làm rụng client), nên container báo unhealthy thật thay vì 200 giả.
    # 503 làm urlopen raise HTTPError, connection-refused raise URLError — cả hai không
    # bắt nên python thoát khác 0 → unhealthy. Chỉ 200 mới sys.exit(0).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - web-proxy
    env_file:
      - .env.production

  # ==========================================
  # 3. NEXTJS - "Kẻ ngốn RAM" thực thụ
  # ==========================================
  nextjs:
    build:
      context: ./finext-nextjs
      dockerfile: dockerfile
      args:
        - NEXT_PUBLIC_API_URL_ARG=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID_ARG=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_SYSTEM_LICENSE_KEYS_ARG=${NEXT_PUBLIC_SYSTEM_LICENSE_KEYS}
        - NEXT_PUBLIC_BASIC_FEATURE_ARG=${NEXT_PUBLIC_BASIC_FEATURE}
        - NEXT_PUBLIC_SYSTEM_FEATURES_ARG=${NEXT_PUBLIC_SYSTEM_FEATURES}
        - NEXT_PUBLIC_SYSTEM_USERS_ARG=${NEXT_PUBLIC_SYSTEM_USERS}
    restart: always
    environment:
      # Runtime-only env var (không phải NEXT_PUBLIC_) — chỉ dùng trên server.
      # Server-side fetch gọi API qua Docker internal network thay vì public URL.
      - INTERNAL_API_URL=http://fastapi:8000
      # Dùng ở app/sitemap.ts và app/robots.ts. Cả hai đã có fallback 'https://finext.vn',
      # nhưng truyền tường minh để không phụ thuộc vào giá trị mặc định trong code.
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://finext.vn}
    # mem_limit/cpus (V1-compatible) mirror deploy.resources (V2/swarm). ~1.5G = 1536M.
    mem_limit: 1536M
    cpus: 2.0
    mem_reservation: 384M
    deploy:
      resources:
        limits:
          memory: 1.5G # Next.js standalone runtime thường dùng 600-900MB
          cpus: '2.0' # Cho phép dùng 2 nhân để Render UI nhanh hơn
        reservations:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Healthcheck qua trang chủ (200) bằng node stdlib (node là runtime, luôn có sẵn).
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - web-proxy
    # SEC-07: KHÔNG nạp .env.production. Biến NEXT_PUBLIC_* đã được nhúng lúc build qua
    # `args` ở trên; biến runtime duy nhất cần thiết nằm trong `environment`. Đã kiểm kê
    # toàn bộ process.env trong finext-nextjs: chỉ có NODE_ENV, INTERNAL_API_URL,
    # NEXT_PUBLIC_BASE_URL và các NEXT_PUBLIC_* đã bake. Process Node render HTML từ input
    # người dùng nên là container không nên cầm SECRET_KEY hay Mongo URI.
    depends_on:
      - fastapi

networks:
  web-proxy: {}