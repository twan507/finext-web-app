<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Kiểm Tra Finext</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        .container {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #1976d2;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p>Chào bạn <strong>{{ name }}</strong>,</p>
        <p>{{ message }}</p>
        <hr>
        <div class="footer">
            <p>Đây là Email tự động từ hệ thống Finext©{{ current_year }}</p>
            <p>Nếu bạn có bất kỳ câu hỏi nào, vui lòng liên hệ với chúng tôi qua finext.vn@gmail.com</p>
        </div>
    </div>
</body>

</html>
