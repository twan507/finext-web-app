# ./nginx/nginx.conf.template

# Map cho WebSocket upgrade support (Next.js HMR).
# Lưu ý: trả '' (rỗng) thay vì 'close' cho non-upgrade request → giữ HTTP/1.1 keepalive
# tới upstream khi không phải WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Cache zone cho Next.js static assets (immutable, hash trong tên file)
proxy_cache_path /var/cache/nginx/nextjs_static levels=1:2 keys_zone=nextjs_static:10m
                 max_size=500m inactive=30d use_temp_path=off;

# --- Gzip (đã chuyển từ FastAPI sang đây để giảm CPU worker Python) ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf;
# QUAN TRỌNG: không gzip SSE — chunked + compression có thể buffer & vỡ stream
gzip_disable "msie6";

# Ẩn phiên bản nginx trong response header "Server" và trang lỗi mặc định
server_tokens off;

# Cấu hình upstream cho các service — bật keepalive để tái sử dụng TCP connection
upstream nextjs_server {
    server nextjs:3000;
    keepalive 32;
    keepalive_timeout 60s;
}

upstream fastapi_server {
    server fastapi:8000;
    keepalive 32;
    keepalive_timeout 60s;
}

# --- Giới hạn kích thước body ---
# Mặc định nginx là 1m (đang gây 413 cho upload ảnh). Giữ 1m làm mặc định cho mọi endpoint,
# riêng location upload override lên 6m (app giới hạn 5MB trong uploads.py, chừa headroom).
client_max_body_size 1m;

# --- Rate limiting zones (chống brute-force + bùng nổ kết nối SSE) ---
# Key theo IP client thật ($binary_remote_addr). Nginx là edge trực tiếp (cấu hình không có
# real_ip/CDN phía trước) nên $binary_remote_addr = IP người dùng thật.
# LƯU Ý: nếu sau này đặt Cloudflare/CDN trước nginx, phải chuyển sang module real_ip,
# nếu không mọi user sẽ dồn chung 1 IP (IP của CDN) và bị rate-limit oan.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=sse_conn:10m;
# REST dữ liệu công khai (/api/v1/sse/rest/). Đặt RỘNG TAY có chủ ý: một lần tải trang
# bắn ~6-15 request, và IP sau NAT (văn phòng/nhà mạng) gộp nhiều người thật. 20r/s +
# burst 100 gần như vô hình với người dùng bình thường nhưng vẫn chặn scraper hammering.
# Siết dần sau khi có metric thật; đừng hạ mù.
limit_req_zone $binary_remote_addr zone=rest_limit:10m rate=1200r/m;
# Upload ảnh: hiếm (đổi avatar). Mỗi request tốn CPU/RAM decode+13 lượt resize.
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
# Form gửi mail: app đã có limiter 1/60s nhưng đó là in-memory per-worker (2 worker).
limit_req_zone $binary_remote_addr zone=email_limit:10m rate=6r/m;

# Server block cho HTTP: Chuyển hướng tất cả sang HTTPS
server {
    listen 80;
    # SỬ DỤNG BIẾN MÔI TRƯỜNG
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    location / {
        return 301 https://$host$request_uri;
    }
}

# Server block cho HTTPS
server {
    listen 443 ssl;
    # BẬT HTTP/2: Multiplexing cho phép nhiều request dùng chung 1 TCP connection.
    # Safari iOS giới hạn 6 connections/host cho HTTP/1.1.
    # App mở 4 SSE streams + N polling requests → exhausts connection pool trên HTTP/1.1.
    # HTTP/2 multiplexing = unlimited streams trên 1 connection → fix hoàn toàn.
    http2 on;

    # SỬ DỤNG BIẾN MÔI TRƯỜNG
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    # --- Cấu hình SSL ---
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/domain.key;
    ssl_trusted_certificate /etc/nginx/ssl/Chain_RootCA_Bundle.crt;

    # Cài đặt SSL nâng cao
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    # -------------------

    # --- Security headers ---
    # HSTS: chỉ gửi trên HTTPS (đặt trong server 443). Trình duyệt ghi nhớ cho toàn domain
    # nên chỉ cần ở đây. CẢNH BÁO: chỉ giữ khi chắc chắn domain phục vụ HTTPS lâu dài — HSTS
    # rất khó thu hồi (browser đã cache). Bỏ 'includeSubDomains' nếu có subdomain chạy HTTP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # LƯU Ý: add_header trong location sẽ GHI ĐÈ (không kế thừa) add_header ở server. Các location
    # tĩnh (/_next/static, /_next/image, regex ảnh) có add_header riêng nên KHÔNG nhận 4 header trên
    # — chấp nhận được (HSTS nhớ theo domain; X-Frame/Referrer chỉ quan trọng với HTML/API, vốn kế thừa đúng).

    # Mã trạng thái khi vượt rate-limit / connection-limit
    limit_req_status 429;
    limit_conn_status 429;

    # --- Cấu hình Reverse Proxy ---

    # REST JSON dùng chung registry với SSE nhưng KHÔNG phải stream: một request, một
    # response. Trước đây nó rơi vào prefix /api/v1/sse/ nên ăn cả `gzip off` lẫn
    # `proxy_buffering off` — payload JSON hàng trăm KB đi trên dây ở dạng thô.
    # Prefix này dài hơn nên nginx chọn nó; /api/v1/sse/stream không khớp, giữ nguyên.
    # Giữ limit_conn sse_conn để không nới lỏng bảo vệ đang có.
    location /api/v1/sse/rest/ {
        limit_conn sse_conn 30;
        limit_req zone=rest_limit burst=100 nodelay;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        # KHÔNG đặt `gzip off` ở đây → kế thừa `gzip on` của http block.
        # application/json đã có trong gzip_types. proxy_buffering giữ mặc định (on).
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # SSE endpoints - cần config đặc biệt cho streaming
    location /api/v1/sse/ {
        # Chống 1 IP mở bùng nổ kết nối SSE (mỗi kết nối giữ 1 upstream trong tối đa 10m).
        # 30 = đủ cho nhiều tab (app mở ~4 stream/tab) nhưng chặn lạm dụng cạn tài nguyên.
        limit_conn sse_conn 30;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # QUAN TRỌNG: Xóa Connection header khi gửi đến upstream
        # Nginx sẽ tự xử lý protocol translation HTTP/2↔HTTP/1.1
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 10m;
        # Tắt gzip riêng cho SSE — text/event-stream phải streaming, không compress
        gzip off;

        # Xóa connection-specific headers từ upstream response
        # HTTP/2 spec cấm các headers này, Nginx sẽ tự strip khi trả về qua HTTP/2
        # nhưng thêm proxy_hide_header để đảm bảo an toàn
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
        proxy_hide_header Transfer-Encoding;
        proxy_hide_header Upgrade;
    }

    # Chat AI (Finext AI): /chat/stream là SSE (nhả từng dòng) → cần no-buffer giống /sse.
    # Đặt TRƯỚC /api/v1/ để longest-prefix match ăn trước. Bao cả REST chat (/conversations, /messages/.../feedback)
    # — no-buffer với JSON nhỏ vô hại. Backend cũng gửi header X-Accel-Buffering: no.
    location /api/v1/chat/ {
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 10m;
        gzip off;

        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
        proxy_hide_header Transfer-Encoding;
        proxy_hide_header Upgrade;
    }

    # Auth endpoints - rate-limit chống brute-force login/register/refresh.
    # Prefix dài hơn /api/v1/ nên longest-prefix match ăn trước. burst=10 nodelay hấp thụ
    # đăng nhập nhiều tab / refresh token đồng thời; sustained 20r/m chặn dò mật khẩu.
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # OTP endpoints - rate-limit chặt hơn (gửi OTP tốn email/SMS, dễ bị lạm dụng để bomb).
    # burst=4 nodelay đủ cho gửi + nhập lại vài lần; sustained 6r/m chặn spam.
    location /api/v1/otps/ {
        limit_req zone=otp_limit burst=4 nodelay;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # Upload ảnh - cho phép body tới 6m (app giới hạn 5MB trong uploads.py, chừa headroom).
    location /api/v1/uploads/ {
        client_max_body_size 6m;
        # Mỗi upload decode ảnh + tới 13 lượt LANCZOS trong threadpool. Không có trần
        # thì vài request đồng thời đủ ngốn hết CPU/RAM của container.
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # Form gửi mail (tư vấn/mở tài khoản/hỏi gói). Trước đây rơi vào /api/v1/ vốn không
    # có limit nào, nên lớp chặn duy nhất là limiter in-memory trong app — mà limiter đó
    # key theo IP lấy từ header nên giả được, và là per-worker (2 worker = 2x).
    location /api/v1/emails/ {
        limit_req zone=email_limit burst=3 nodelay;
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # REST API endpoints
    location /api/v1/ {
        proxy_pass http://fastapi_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Xóa connection-specific headers từ upstream response
        proxy_hide_header Connection;
        proxy_hide_header Keep-Alive;
    }

    # Next.js static assets — file có hash trong tên, immutable, cache 1 năm
    location /_next/static/ {
        proxy_pass http://nextjs_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_cache nextjs_static;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Status $upstream_cache_status always;
        access_log off;
    }

    # Next.js optimized images — cache ngắn hơn vì có thể đổi
    location /_next/image {
        proxy_pass http://nextjs_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_cache nextjs_static;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Favicon + public assets từ Next.js
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf)$ {
        proxy_pass http://nextjs_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_cache nextjs_static;
        proxy_cache_valid 200 7d;
        # Regex location này THẮNG prefix /_next/static/ (prefix đó thiếu ^~), nên font
        # và ảnh trong /_next/static/media/ rơi vào đây và mất cache_lock/use_stale của
        # block kia. Cache nguội (sau deploy) → N request đồng thời cùng đi upstream.
        # Chỉ thêm 2 directive phía nginx; Cache-Control gửi client giữ nguyên 7d để
        # không đổi hành vi phía trình duyệt.
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    # Next.js frontend
    location / {
        proxy_pass http://nextjs_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade support cho Next.js HMR
        # $connection_upgrade = '' khi không phải WS → giữ keepalive tới upstream
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}